type: charm

parts:
  charm:
    build-snaps:
      - rustup
    build-packages:
      - libpq-dev
      - git
      - libffi-dev
      - libssl-dev
      - pkg-config
    override-build:
      # get latest rust stable toolchain
      rustup default stable

      craftctl default
    charm-strict-dependencies: true 
  libpq:
    build-packages:
      - libpq-dev
    plugin: dump
    source: /usr/lib/
    source-type: local
    prime:
      - lib/
    organize:
      "*-linux-gnu/libpq.so*": lib/

bases:
  - build-on:
    - name: ubuntu
      channel: "22.04"
    run-on:
    - name: ubuntu
      channel: "22.04"
